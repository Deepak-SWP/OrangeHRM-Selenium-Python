name: OrangeHRM Automation

on:
  push:
    branches:
      - main

    paths-ignore:
      - 'README.md'
      - 'screenshots/**'
      - 'reports/**'
      - 'allure-results/**'
      - 'allure-report/**'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.gif'
      - '.gitignore'

  pull_request:
    branches:
      - main

    paths-ignore:
      - 'README.md'
      - 'screenshots/**'
      - 'reports/**'
      - 'allure-results/**'
      - 'allure-report/**'
      - '*.png'
      - '*.jpg'
      - '*.jpeg'
      - '*.gif'
      - '.gitignore'

jobs:
  test:

    runs-on: windows-latest

    steps:

      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run Behave Tests
        run: |
          behave